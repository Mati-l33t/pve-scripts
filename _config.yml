theme: jekyll-theme-chirpy

lang: en
timezone: Finland/Helsinki

title: Proxmox VE Scripts
tagline: Streamlining your HomeLab
description: >- # this means to ignore newlines until "baseurl:"
  A collection of scripts for Proxmox and other usefull things.

url: "https://proxmox-scripts.com"
baseurl: ""

github:
  username: jekyll

twitter:
  username: jekyllrb

social:
  name: Proxmox-Scripts
  email: info@proxmox-scripts.com
  links:
    - https://github.com/Mati-l33t

theme_mode: # [dark | light] - leave blank to follow system preference

avatar: "/assets/img/logoo.png"

toc: true

comments:
  active: ""

paginate: 10

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
